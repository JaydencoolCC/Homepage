<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ChineseSafe Benchmark leaderboard preview</title>
  <desc id="desc">A leaderboard interface preview with filters, tabs, and safety benchmark model scores.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-30%" width="116%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.08"/>
    </filter>
    <style>
      .label { fill: #6b7280; font: 600 19px Inter, Arial, sans-serif; }
      .muted { fill: #9ca3af; font: 400 16px Inter, Arial, sans-serif; }
      .cell { fill: #1f2937; font: 500 20px "SFMono-Regular", Consolas, monospace; }
      .head { fill: #1f2937; font: 700 21px "SFMono-Regular", Consolas, monospace; }
      .tab { fill: #374151; font: 600 18px Inter, Arial, sans-serif; }
      .chip { fill: #374151; font: 600 16px Inter, Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>

  <g transform="translate(64 46)">
    <rect x="0" y="0" width="386" height="128" rx="10" fill="#ffffff" stroke="#e5e7eb" filter="url(#shadow)"/>
