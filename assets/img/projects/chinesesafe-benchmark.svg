    <text x="16" y="58" class="muted">Please choose the type to display.</text>
    <rect x="16" y="82" width="354" height="47" rx="9" fill="#ffffff" stroke="#e5e7eb" filter="url(#shadow)"/>
    <text x="36" y="113" class="chip">Overall</text>
    <path d="M314 103l6 7l7-7z" fill="#1f2937"/>
  </g>

